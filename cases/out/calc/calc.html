<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: 'Segoe UI', sans-serif;
  }
  .calculator {
    background: #16213e;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    width: 320px;
  }
  .display {
    background: #0f3460;
    border-radius: 12px;
    padding: 20px 16px 12px;
    margin-bottom: 16px;
    text-align: right;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .expression {
    color: #a0a0c0;
    font-size: 14px;
    min-height: 20px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .result {
    color: #e0e0ff;
    font-size: 36px;
    font-weight: 300;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  button {
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 500;
    cursor: pointer;
    padding: 18px 0;
    transition: transform 0.1s, opacity 0.1s;
  }
  button:active { transform: scale(0.94); opacity: 0.85; }
  .btn-num {
    background: #1a4a7a;
    color: #e0e0ff;
  }
  .btn-num:hover { background: #1e5590; }
  .btn-op {
    background: #e94560;
    color: #fff;
  }
  .btn-op:hover { background: #f05070; }
  .btn-fn {
    background: #0f3460;
    color: #a0c4ff;
  }
  .btn-fn:hover { background: #144080; }
  .btn-eq {
    background: #e94560;
    color: #fff;
    grid-column: span 2;
  }
  .btn-eq:hover { background: #f05070; }
  .btn-zero {
    grid-column: span 2;
  }
</style>
</head>
<body>
<div class="calculator">
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="buttons">
    <button class="btn-fn" onclick="clearAll()">AC</button>
    <button class="btn-fn" onclick="toggleSign()">+/-</button>
    <button class="btn-fn" onclick="percent()">%</button>
    <button class="btn-op" onclick="inputOp('/')">÷</button>

    <button class="btn-num" onclick="inputDigit('7')">7</button>
    <button class="btn-num" onclick="inputDigit('8')">8</button>
    <button class="btn-num" onclick="inputDigit('9')">9</button>
    <button class="btn-op" onclick="inputOp('*')">×</button>

    <button class="btn-num" onclick="inputDigit('4')">4</button>
    <button class="btn-num" onclick="inputDigit('5')">5</button>
    <button class="btn-num" onclick="inputDigit('6')">6</button>
    <button class="btn-op" onclick="inputOp('-')">−</button>

    <button class="btn-num" onclick="inputDigit('1')">1</button>
    <button class="btn-num" onclick="inputDigit('2')">2</button>
    <button class="btn-num" onclick="inputDigit('3')">3</button>
    <button class="btn-op" onclick="inputOp('+')">+</button>

    <button class="btn-num btn-zero" onclick="inputDigit('0')">0</button>
    <button class="btn-num" onclick="inputDot()">.</button>
    <button class="btn-eq" onclick="calculate()">=</button>
  </div>
</div>
<script>
  let current = '0';
  let previous = '';
  let operator = null;
  let justEvaluated = false;

  const resultEl = document.getElementById('result');
  const expressionEl = document.getElementById('expression');

  function updateDisplay() {
    resultEl.textContent = current;
  }

  function inputDigit(d) {
    if (justEvaluated) { current = d; justEvaluated = false; }
    else current = current === '0' ? d : current + d;
    updateDisplay();
  }

  function inputDot() {
    if (justEvaluated) { current = '0.'; justEvaluated = false; updateDisplay(); return; }
    if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function inputOp(op) {
    justEvaluated = false;
    if (operator && previous !== '') {
      const res = evaluate(parseFloat(previous), parseFloat(current), operator);
      current = formatNum(res);
      previous = '';
    }
    operator = op;
    previous = current;
    current = '0';
    expressionEl.textContent = previous + ' ' + displayOp(op);
    updateDisplay();
  }

  function evaluate(a, b, op) {
    switch (op) {
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/': return b === 0 ? NaN : a / b;
    }
  }

  function calculate() {
    if (!operator || previous === '') return;
    const a = parseFloat(previous);
    const b = parseFloat(current);
    expressionEl.textContent = previous + ' ' + displayOp(operator) + ' ' + current + ' =';
    const res = evaluate(a, b, operator);
    current = isNaN(res) ? 'Error' : formatNum(res);
    previous = '';
    operator = null;
    justEvaluated = true;
    updateDisplay();
  }

  function clearAll() {
    current = '0'; previous = ''; operator = null; justEvaluated = false;
    expressionEl.textContent = '';
    updateDisplay();
  }

  function toggleSign() {
    if (current === '0' || current === 'Error') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }

  function percent() {
    const n = parseFloat(current);
    current = formatNum(n / 100);
    updateDisplay();
  }

  function formatNum(n) {
    if (!isFinite(n)) return 'Error';
    const s = parseFloat(n.toPrecision(12)).toString();
    return s;
  }

  function displayOp(op) {
    return { '+': '+', '-': '−', '*': '×', '/': '÷' }[op] || op;
  }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') inputDigit(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') inputOp('+');
    else if (e.key === '-') inputOp('-');
    else if (e.key === '*') inputOp('*');
    else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      if (current.length > 1) current = current.slice(0, -1);
      else current = '0';
      updateDisplay();
    }
  });
</script>
</body>
</html>
