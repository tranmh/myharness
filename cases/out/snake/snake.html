<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #e0e0e0;
  }
  h1 { font-size: 2rem; margin-bottom: 10px; color: #4ecca3; letter-spacing: 4px; }
  #score-board {
    font-size: 1.1rem;
    margin-bottom: 12px;
    color: #a0a0c0;
  }
  #score { color: #4ecca3; font-weight: bold; }
  canvas {
    border: 2px solid #4ecca3;
    box-shadow: 0 0 20px rgba(78, 204, 163, 0.3);
    background: #16213e;
  }
  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  #overlay h2 { font-size: 2rem; color: #e94560; }
  #overlay p { color: #a0a0c0; font-size: 1rem; }
  #overlay button {
    padding: 10px 28px;
    background: #4ecca3;
    color: #1a1a2e;
    border: none;
    font-family: inherit;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 2px;
    transition: background 0.2s;
  }
  #overlay button:hover { background: #38b48f; }
</style>
</head>
<body>
<h1>SNAKE</h1>
<div id="score-board">SCORE: <span id="score">0</span></div>
<div style="position:relative">
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="overlay">
    <p>Use arrow keys to move</p>
    <button id="start-btn">START</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');

const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;

let snake, dir, nextDir, food, score, running, loop;

function init() {
  snake = [
    {x: 10, y: 10},
    {x: 9,  y: 10},
    {x: 8,  y: 10},
  ];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  scoreEl.textContent = '0';
  placeFood();
}

function placeFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  let pos;
  do {
    pos = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)};
  } while (occupied.has(`${pos.x},${pos.y}`));
  food = pos;
}

function step() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    gameOver(); return;
  }
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver(); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      ctx.fillRect(x * CELL + CELL/2 - 1, y * CELL + CELL/2 - 1, 2, 2);
    }
  }

  // Food
  const fx = food.x * CELL + CELL / 2;
  const fy = food.y * CELL + CELL / 2;
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.arc(fx, fy, CELL / 2 - 2, 0, Math.PI * 2);
  ctx.fill();

  // Snake
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    const r = Math.round(78 + (22 - 78) * t);
    const g = Math.round(204 + (180 - 204) * t);
    const b = Math.round(163 + (100 - 163) * t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
  });

  // Eyes on head
  const head = snake[0];
  ctx.fillStyle = '#16213e';
  const ex = dir.y !== 0 ? 4 : (dir.x > 0 ? CELL - 6 : 4);
  const ey = dir.x !== 0 ? 4 : (dir.y > 0 ? CELL - 6 : 4);
  ctx.fillRect(head.x * CELL + ex, head.y * CELL + ey, 3, 3);
  ctx.fillRect(head.x * CELL + (dir.y !== 0 ? CELL - 7 : ex), head.y * CELL + (dir.x !== 0 ? CELL - 7 : ey), 3, 3);
}

function gameOver() {
  running = false;
  clearInterval(loop);
  overlay.innerHTML = `
    <h2>GAME OVER</h2>
    <p>Score: ${score}</p>
    <button id="start-btn">PLAY AGAIN</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('start-btn').addEventListener('click', startGame);
}

function startGame() {
  overlay.style.display = 'none';
  init();
  running = true;
  clearInterval(loop);
  loop = setInterval(step, 120);
  draw();
}

document.addEventListener('keydown', e => {
  if (!running) return;
  const keys = {
    ArrowUp:    {x: 0, y: -1},
    ArrowDown:  {x: 0, y:  1},
    ArrowLeft:  {x: -1, y: 0},
    ArrowRight: {x:  1, y: 0},
  };
  const d = keys[e.key];
  if (!d) return;
  if (d.x === -dir.x && d.y === -dir.y) return; // no 180
  nextDir = d;
  e.preventDefault();
});

startBtn.addEventListener('click', startGame);
</script>
</body>
</html>
